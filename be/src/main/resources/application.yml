spring:
  application:
    name: rag-poc
  profiles:
    active: ${RAG_STORE:memory}
  flyway:
    baseline-on-migrate: true
  datasource:
    url: ${DB_URL:jdbc:h2:mem:rag;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:100MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:1GB}

langchain4j:
  open-ai:
    chat-model:
      base-url: https://openrouter.ai/api/v1
      api-key: ${OPENROUTER_API_KEY}
      model-name: ${OPENROUTER_MODEL:openai/gpt-4o-mini}
    embedding-model:
      base-url: ${OPENROUTER_EMBEDDING_BASE_URL:https://openrouter.ai/api/v1}
      api-key: ${OPENROUTER_API_KEY}
      model-name: ${OPENROUTER_EMBEDDING_MODEL:openai/text-embedding-3-small}
      timeout-seconds: ${OPENROUTER_EMBEDDING_TIMEOUT_SECONDS:45}
      max-retries: ${OPENROUTER_EMBEDDING_MAX_RETRIES:0}
      max-segments-per-batch: ${OPENROUTER_EMBEDDING_MAX_SEGMENTS_PER_BATCH:8}

app:
  store:
    type: ${RAG_STORE:memory}
  rag:
    max-results: ${RAG_MAX_RESULTS:50}
    max-allowed-results: ${RAG_MAX_ALLOWED_RESULTS:200}
    min-score: ${RAG_MIN_SCORE:0.75}
    no-results-answer: ${RAG_NO_RESULTS_ANSWER:I couldn't find relevant information in the ingested resumes.}
  resumes:
    path: ${RESUMES_PATH:./downloaded-resumes}
  ingest:
    file-timeout-seconds: ${INGEST_FILE_TIMEOUT_SECONDS:60}
  pgvector:
    table: document_embeddings
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
server:
  port: 8084

logging:
  level:
    dev.langchain4j.internal.RetryUtils: ERROR
