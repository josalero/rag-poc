spring:
  application:
    name: rag-poc
  profiles:
    active: ${RAG_STORE:memory}
  flyway:
    baseline-on-migrate: true
  datasource:
    url: ${DB_URL:jdbc:h2:mem:rag;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true

langchain4j:
  open-ai:
    chat-model:
      base-url: https://openrouter.ai/api/v1
      api-key: ${OPENROUTER_API_KEY}
      model-name: ${OPENROUTER_MODEL:openai/gpt-4o-mini}
    embedding-model:
      base-url: ${OPENROUTER_EMBEDDING_BASE_URL:https://openrouter.ai/api/v1}
      api-key: ${OPENROUTER_API_KEY}
      model-name: ${OPENROUTER_EMBEDDING_MODEL:openai/text-embedding-3-small}

app:
  store:
    type: ${RAG_STORE:memory}
  resumes:
    path: ${RESUMES_PATH:./downloaded-resumes}
  pgvector:
    table: document_embeddings
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
server:
  port: 8084
