# Postgres store: PostgreSQL + pgvector. Set DB_URL, DB_USER, DB_PASSWORD (and optionally RAG_STORE=postgres).
spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/rag?currentSchema=public}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

app:
  store:
    type: postgres
