# In-memory store: H2 + InMemoryEmbeddingStore. No Postgres required. Data is lost on restart.
spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:rag;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

app:
  store:
    type: memory
